<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Daily - 语音与音频 AI 日报</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="header">
    <h1>🎙️ Paper Daily</h1>
    <p class="subtitle">语音与音频 AI 日报</p>
    <p class="date">每天精选 arXiv 最新论文，深度中文分析</p>
  </header>

  <div class="container">
    <section class="section">
      <h2 class="section-title">📅 日报列表</h2>
      <ul class="paper-list" id="daily-list">
        <!-- 日报列表由 JS 动态生成 -->
      </ul>
    </section>
  </div>

  <footer class="footer">
    <p>自动生成 by Hermes OWL · 数据来源：arXiv eess.AS + cs.SD</p>
  </footer>

  <script>
    // 日报列表 - 每天运行后自动更新
    const dailyReports = [
      { date: '2026-06-11', title: '第5期 · PDF 全文分析', url: 'daily/2026-06-11/index.html' },
    ];

    const listEl = document.getElementById('daily-list');
    dailyReports.forEach(report => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${report.url}">${report.title}</a><span class="date">${report.date}</span>`;
      listEl.appendChild(li);
    });
  </script>
</body>
</html>
